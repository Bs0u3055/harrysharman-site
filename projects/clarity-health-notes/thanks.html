<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Request Received — Clarity Health Notes</title>
  <meta name="description" content="Your Clarity Health Notes sample request has been received.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/site-nav.js" defer></script>
  <style>
    html,
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--f-sans);
    }

    .thanks-wrap {
      min-height: calc(100vh - 44px);
      display: grid;
      place-items: center;
      padding: 48px 24px;
      border-bottom: 2px solid var(--ink);
    }

    .thanks-panel {
      max-width: 760px;
      border: 2px solid var(--ink);
      background: #fffdf8;
      box-shadow: 8px 8px 0 var(--ink);
      padding: clamp(28px, 6vw, 56px);
    }

    .thanks-kicker {
      font-family: var(--f-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #0f766e;
      margin-bottom: 18px;
    }

    .thanks-title {
      font-size: clamp(36px, 7vw, 68px);
      line-height: 0.95;
      letter-spacing: 0;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .thanks-copy {
      font-size: 17px;
      line-height: 1.7;
      color: rgba(26, 20, 16, 0.7);
      margin-bottom: 28px;
    }

    .thanks-link {
      display: inline-flex;
      padding: 13px 20px;
      border: 2px solid var(--ink);
      background: var(--ink);
      color: var(--cream);
      font-family: var(--f-mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <main class="thanks-wrap">
    <section class="thanks-panel">
      <div class="thanks-kicker">Request received</div>
      <h1 class="thanks-title">Thanks. We’ll review the fit.</h1>
      <p class="thanks-copy">If the tracker idea looks useful, Harry or Taleb will follow up with the next step. If it looks like the wrong tool for the job, we will say that clearly.</p>
      <a class="thanks-link" href="/projects/clarity-health-notes/">Back to Clarity Health Notes</a>
    </section>
  </main>
</body>
</html>
