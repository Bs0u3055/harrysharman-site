[build]
  command = "echo 'Static site only'"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions."ai-habit-sequence-send"]
  schedule = "0 7 * * 1-5"

[functions."ai-habit-paid-sequence-send"]
  schedule = "15 7 * * 1-5"


[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/feed.xml"
  to = "/.netlify/functions/podcast-feed"
  status = 200

[[redirects]]
  from = "/feed"
  to = "/.netlify/functions/podcast-feed"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
